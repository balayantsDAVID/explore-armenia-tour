<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExploreArmenia | База мест</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
    }

    .upload-zone {
      border: 2px dashed #cbd5e1;
      transition: all 0.2s;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: #0891b2;
      background: #ecfeff;
    }

    .photo-preview {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

  <div class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
    <h1 class="text-xl font-bold text-gray-800">🗺 База достопримечательностей (Мультиязычная)</h1>
    <div class="flex items-center gap-4">
      <span id="places_counter" class="text-sm text-gray-400"></span>
      <a href="index.html" class="text-sm text-cyan-600 hover:text-cyan-700 font-medium">← К генератору</a>
    </div>
  </div>

  <div class="max-w-6xl mx-auto p-6">

    <div id="place_form" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
      <div class="flex justify-between items-center mb-5">
        <h3 class="text-lg font-bold text-gray-800">Добавить новое место</h3>
        <button onclick="resetForm()" class="text-xs text-gray-400 hover:text-gray-600">✕ Сбросить форматы</button>
      </div>
      <input type="hidden" id="editing_id">

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Название RU *</label>
          <input type="text" id="p_name_ru" placeholder="Монастырь Хор Вирап"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Название EN</label>
          <input type="text" id="p_name_en" placeholder="Khor Virap Monastery"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Название DE</label>
          <input type="text" id="p_name_de" placeholder="Kloster Chor Virap"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Название HY</label>
          <input type="text" id="p_name_hy" placeholder="Խոր Վիրապ վանք"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Slug * (уникальный ID латиницей)</label>
          <input type="text" id="p_slug" placeholder="khor-virap"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Псевдонимы ИИ (через запятую)</label>
          <input type="text" id="p_aliases" placeholder="Хор-Вирап, Хор Вирап, Khor Virap"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Описание RU</label>
          <textarea id="p_desc_ru" rows="3" placeholder="Описание на русском языке..."
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:border-cyan-400"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Описание EN</label>
          <textarea id="p_desc_en" rows="3" placeholder="Description in English..."
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:border-cyan-400"></textarea>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Описание DE</label>
          <textarea id="p_desc_de" rows="3" placeholder="Beschreibung auf Deutsch..."
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:border-cyan-400"></textarea>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Описание HY</label>
          <textarea id="p_desc_hy" rows="3" placeholder="Նկարագրություն հայերենով..."
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:border-cyan-400"></textarea>
        </div>
      </div>

      <div class="mb-5">
        <label class="block text-xs font-semibold text-gray-500 mb-1">Главное изображение</label>
        <div class="max-w-md">
          <div id="upload_zone_1" class="upload-zone rounded-lg p-4 text-center cursor-pointer relative"
            onclick="document.getElementById('file_input_1').click()" ondragover="handleDragOver(event)"
            ondragleave="handleDragLeave()" ondrop="handleDrop(event)">
            <input type="file" id="file_input_1" accept="image/*" class="hidden" onchange="handleFileSelect(event)">
            <div id="preview_container_1">
              <div class="text-gray-300 text-3xl mb-1">📷</div>
              <p class="text-xs text-gray-400">Нажми или перетащи фото сюда</p>
            </div>
            <div id="upload_status_1" class="hidden text-xs text-cyan-600 mt-1"></div>
          </div>
          <input type="hidden" id="p_img1" value="">
          <p id="img1_url" class="text-xs text-gray-300 mt-1 truncate"></p>
        </div>
      </div>

      <div class="flex gap-3">
        <button onclick="savePlace()"
          class="bg-cyan-600 text-white px-8 py-2.5 rounded-lg font-semibold text-sm hover:bg-cyan-700 transition">
          Сохранить в базу
        </button>
        <button onclick="resetForm()"
          class="bg-gray-100 text-gray-600 px-6 py-2.5 rounded-lg font-semibold text-sm hover:bg-gray-200 transition">
          Отмена
        </button>
      </div>
    </div>

    <div class="mb-4">
      <input type="text" id="search_input" placeholder="🔍 Быстрый поиск по названию (ищет сразу на всех 4 языках)..."
        class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400"
        oninput="loadPlaces()">
    </div>

    <div id="places_list" class="space-y-3">
      <div class="text-center text-gray-400 py-8">Загрузка базы данных...</div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    // ============================================================
    // Загрузка фото (Drag & Drop + клик)
    // ============================================================
    function handleDragOver(e) { e.preventDefault(); document.getElementById('upload_zone_1').classList.add('dragover'); }
    function handleDragLeave() { document.getElementById('upload_zone_1').classList.remove('dragover'); }
    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('upload_zone_1').classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) uploadPhoto(file);
    }
    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) uploadPhoto(file);
    }

    async function uploadPhoto(file) {
      const status = document.getElementById('upload_status_1');
      const preview = document.getElementById('preview_container_1');
      const localUrl = URL.createObjectURL(file);

      preview.innerHTML = `<img src="${localUrl}" class="photo-preview">`;
      status.classList.remove('hidden');
      status.innerHTML = `⏳ Загружаем на сервер...`;

      try {
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch(`https://test.explorearmenia.am/upload.php?key=explorearmenia2026`, { method: 'POST', body: formData });
        const data = await res.json();

        if (data.url) {
          document.getElementById('p_img1').value = data.url;
          document.getElementById('img1_url').textContent = data.url;
          preview.innerHTML = `<img src="${data.url}" class="photo-preview">`;
          status.innerHTML = `✅ Успешно загружено`;
        } else {
          throw new Error(data.error || 'Ошибка загрузки');
        }
      } catch (e) {
        status.innerHTML = `❌ Ошибка: ${e.message}`;
        document.getElementById('p_img1').value = '';
      }
    }

    // ============================================================
    // Редактирование места (Заполнение всех 4 языков)
    // ============================================================
    async function editPlace(id) {
      try {
        const res = await fetch(`${RENDER_API_URL}/places`);
        const data = await res.json();
        const place = data.places.find(p => p.id === id);
        if (!place) { alert('Место не найдено'); return; }

        document.getElementById('p_slug').value = place.slug || '';
        document.getElementById('p_name_ru').value = place.name_ru || '';
        document.getElementById('p_name_en').value = place.name_en || '';
        document.getElementById('p_name_de').value = place.name_de || '';
        document.getElementById('p_name_hy').value = place.name_hy || '';
        document.getElementById('p_desc_ru').value = place.desc_ru || '';
        document.getElementById('p_desc_en').value = place.desc_en || '';
        document.getElementById('p_desc_de').value = place.desc_de || '';
        document.getElementById('p_desc_hy').value = place.desc_hy || '';
        document.getElementById('p_aliases').value = ''; // Сбрасываем строку псевдонимов
        document.getElementById('editing_id').value = id;

        if (place.photo_main) {
          document.getElementById('p_img1').value = place.photo_main;
          document.getElementById('img1_url').textContent = place.photo_main;
          document.getElementById('preview_container_1').innerHTML = `<img src="${place.photo_main}" class="photo-preview">`;
        } else {
          document.getElementById('p_img1').value = '';
          document.getElementById('img1_url').textContent = '';
          document.getElementById('preview_container_1').innerHTML = `<div class="text-gray-300 text-3xl mb-1">📷</div><p class="text-xs text-gray-400">Нажми или перетащи фото сюда</p>`;
        }

        document.querySelector('#place_form h3').textContent = `✏️ Редактировать: ${place.name_ru}`;
        document.getElementById('place_form').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (e) {
        alert(`Ошибка получения данных: ${e.message}`);
      }
    }

    // ============================================================
    // Сброс формы
    // ============================================================
    function resetForm() {
      document.getElementById('editing_id').value = '';
      document.querySelector('#place_form h3').textContent = 'Добавить новое место';
      ['p_slug', 'p_name_ru', 'p_name_en', 'p_name_de', 'p_name_hy', 'p_desc_ru', 'p_desc_en', 'p_desc_de', 'p_desc_hy', 'p_aliases'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('p_img1').value = '';
      document.getElementById('img1_url').textContent = '';
      document.getElementById('preview_container_1').innerHTML = `<div class="text-gray-300 text-3xl mb-1">📷</div><p class="text-xs text-gray-400">Нажми или перетащи фото сюда</p>`;
      document.getElementById('upload_status_1').innerHTML = '';
    }

    // ============================================================
    // Отрисовка списка мест
    // ============================================================
    function renderPlacesList(places) {
      const container = document.getElementById('places_list');
      if (!container) return;
      if (places.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-8">В базе пока нет мест</p>';
        return;
      }

      container.innerHTML = places.map(p => `
        <div class="bg-white border border-gray-100 rounded-xl p-4 flex items-start gap-4 hover:shadow-sm transition">
          <div class="flex-shrink-0 w-20 h-16 rounded-lg overflow-hidden bg-gray-100">
            ${p.photo_main
          ? `<img src="${p.photo_main}" class="w-full h-full object-cover" onerror="this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-gray-300 text-xs\\'>нет фото</div>'">`
          : `<div class="flex items-center justify-center h-full text-gray-300 text-xs">нет фото</div>`}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start gap-2">
              <div>
                <span class="font-semibold text-gray-800">${p.name_ru || '—'}</span>
                ${p.name_en ? `<span class="text-gray-400 text-xs ml-2">EN: ${p.name_en}</span>` : ''}
                ${p.name_de ? `<span class="text-gray-400 text-xs ml-2">DE: ${p.name_de}</span>` : ''}
                ${p.name_hy ? `<span class="text-gray-400 text-xs ml-2">HY: ${p.name_hy}</span>` : ''}
              </div>
              <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-500 font-mono">${p.slug}</span>
            </div>
            <p class="text-sm text-gray-500 mt-1 line-clamp-2">${p.desc_ru || 'Нет описания на русском языке'}</p>
            <div class="flex gap-3 mt-2">
              <button onclick="editPlace(${p.id})" class="text-xs text-cyan-600 hover:text-cyan-700 font-medium hover:underline">✏️ Редактировать</button>
              <button onclick="deletePlace(${p.id})" class="text-xs text-red-400 hover:text-red-600 font-medium hover:underline">🗑 Удалить</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Загрузка данных при старте страницы
    loadPlaces();
  </script>
</body>

</html>
