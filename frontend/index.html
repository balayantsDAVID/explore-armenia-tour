<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>ExploreArmenia | Генератор Туров</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">
        <header class="flex justify-between items-center mb-8 border-b pb-4">
            <h1 class="text-2xl font-bold text-cyan-600">ExploreArmenia <span class="text-gray-400 font-light">|
                    Generator</span></h1>
            <a href="admin.html" class="text-sm text-gray-400 hover:text-cyan-600">База мест →</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Маршрут (Промт):</label>
                <textarea id="route_prompt" rows="12" class="w-full p-3 border rounded-lg text-sm"
                    placeholder="День 1 — прилет..."></textarea>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="start_date" placeholder="Дата начала" class="p-2 border rounded text-sm">
                    <input type="text" id="end_date" placeholder="Дата конца" class="p-2 border rounded text-sm">
                </div>
                <input type="text" id="flight_in" placeholder="Рейс прилета (SU 1860, 12:55)"
                    class="w-full p-2 border rounded text-sm">
                <input type="text" id="flight_out" placeholder="Рейс вылета" class="w-full p-2 border rounded text-sm">
                <input type="number" id="participants" placeholder="Кол-во человек"
                    class="w-full p-2 border rounded text-sm">
                <input type="text" id="hotel" placeholder="Отель" class="w-full p-2 border rounded text-sm">
                <input type="text" id="contact" placeholder="Контакт (Светлана +7...)"
                    class="w-full p-2 border rounded text-sm">

                <select id="lang" class="w-full p-2 border rounded text-sm bg-gray-50">
                    <option value="ru">Язык: Русский</option>
                    <option value="en">Язык: English</option>
                </select>

                <button onclick="generateTour()" id="gen_btn"
                    class="w-full bg-cyan-600 text-white py-3 rounded-lg font-bold hover:bg-cyan-700 transition">
                    СГЕНЕРИРОВАТЬ ПРОГРАММУ
                </button>

                <!-- Статус генерации -->
                <div id="status_area" class="hidden mt-4 p-4 bg-gray-50 rounded-lg border text-sm font-mono">
                    <div id="status_text" class="text-gray-600"></div>
                </div>

                <!-- Ошибки -->
                <div id="error_area"
                    class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm"></div>
                <div id="result_area" class="hidden p-4 bg-green-50 border border-green-200 rounded-lg">
                    <h3 class="font-bold text-green-800 mb-3">✅ Готово! Скачайте файлы:</h3>
                    <p id="result_info" class="text-sm text-gray-500 mb-3"></p>
                    <div class="flex gap-3">
                        <a id="link_docx" href="#" target="_blank"
                            class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">
                            📄 Word (.docx)
                        </a>
                        <a id="link_pdf" href="#" target="_blank"
                            class="bg-red-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-700">
                            📋 PDF
                        </a>
                    </div>
                    <div id="not_found_warning"
                        class="hidden mt-3 p-2 bg-yellow-50 border border-yellow-200 rounded text-xs text-yellow-700">
                        ⚠️ Не найдено в базе: <span id="not_found_list"></span>
                    </div>
                </div>
            </div>
        </div>

        <div id="result_area" class="mt-8 hidden border-t pt-6">
            <h3 class="font-bold mb-4">Готово! Скачайте файлы:</h3>
            <div class="flex space-x-4">
                <a id="link_docx" href="#"
                    class="bg-blue-100 text-blue-700 px-6 py-2 rounded-full text-sm font-semibold">Word (.docx)</a>
                <a id="link_pdf" href="#"
                    class="bg-red-100 text-red-700 px-6 py-2 rounded-full text-sm font-semibold">PDF</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
