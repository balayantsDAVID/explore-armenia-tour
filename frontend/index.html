<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExploreArmenia | Генератор Туров</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">

    <header class="flex justify-between items-center mb-6 border-b pb-4">
      <h1 class="text-2xl font-bold text-cyan-600">ExploreArmenia
        <span class="text-gray-400 font-light">| Generator</span>
      </h1>
      <a href="admin.html" class="text-sm text-gray-400 hover:text-cyan-600 transition">База мест →</a>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Левая колонка: маршрут -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Маршрут (Промт):</label>
        <textarea id="route_prompt" rows="13"
          class="w-full p-3 border border-gray-200 rounded-lg text-sm resize-none focus:outline-none focus:border-cyan-400"
          placeholder="День 1 (07.05, четверг) — прилет – трансфер в Ереван - заселение&#10;День 2 (08.05, пятница) — храм Гарни – монастырь Гегард&#10;День 3 (09.05, суббота) — монастырь Хор Вирап – Нораванк&#10;..."></textarea>
      </div>

      <!-- Правая колонка: данные тура -->
      <div class="space-y-3">

        <!-- Даты с type="date" — встроенный календарь браузера -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Дата начала</label>
            <input type="date" id="start_date"
              class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400"
              onchange="formatDate('start_date', 'start_date_display')">
            <input type="hidden" id="start_date_display">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-500 mb-1">Дата окончания</label>
            <input type="date" id="end_date"
              class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400"
              onchange="formatDate('end_date', 'end_date_display')">
            <input type="hidden" id="end_date_display">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Рейс прилёта</label>
          <input type="text" id="flight_in" placeholder="SU 1860, прилет в 12:55"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Рейс вылета</label>
          <input type="text" id="flight_out" placeholder="SU 1861, вылет в 19:45"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Количество участников</label>
          <input type="number" id="participants" placeholder="4" min="1"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Отель</label>
          <input type="text" id="hotel" placeholder="Holiday INN Express (самостоятельно)"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Контактное лицо</label>
          <input type="text" id="contact" placeholder="Светлана Ходакова, +79655914681"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1">Язык документа</label>
          <select id="lang"
            class="w-full p-2.5 border border-gray-200 rounded-lg text-sm bg-white focus:outline-none focus:border-cyan-400">
            <option value="ru">🇷🇺 Русский</option>
            <option value="en">🇬🇧 English</option>
          </select>
        </div>

        <button onclick="generateTour()" id="gen_btn"
          class="w-full bg-cyan-600 text-white py-3 rounded-lg font-bold hover:bg-cyan-700 transition text-sm">
          СГЕНЕРИРОВАТЬ ПРОГРАММУ
        </button>
      </div>
    </div>

    <!-- Статус -->
    <div id="status_area" class="hidden mt-4 p-4 bg-gray-50 rounded-lg border text-sm text-gray-600">
      <div id="status_text"></div>
    </div>

    <!-- Ошибка -->
    <div id="error_area" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

    <!-- Результат -->
    <div id="result_area" class="hidden mt-4 p-4 bg-green-50 border border-green-200 rounded-xl">
      <h3 class="font-bold text-green-800 mb-1">✅ Готово! Скачайте файлы:</h3>
      <p id="result_info" class="text-xs text-gray-500 mb-3"></p>
      <div class="flex gap-3">
        <a id="link_docx" href="#" target="_blank"
          class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
          📄 Word (.docx)
        </a>
        <a id="link_pdf" href="#" target="_blank"
          class="bg-red-600 text-white px-5 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition">
          📋 PDF
        </a>
      </div>
      <div id="not_found_warning"
        class="hidden mt-3 p-2 bg-yellow-50 border border-yellow-200 rounded text-xs text-yellow-700">
        ⚠️ Не найдено в базе: <span id="not_found_list" class="font-medium"></span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    // Форматируем дату из yyyy-mm-dd в dd.mm.yyyy для отправки на бэкенд
    function formatDate(inputId, hiddenId) {
      const input = document.getElementById(inputId);
      const hidden = document.getElementById(hiddenId);
      if (input.value) {
        const [y, m, d] = input.value.split('-');
        hidden.value = `${d}.${m}.${y}`;
      }
    }

    // Переопределяем сбор данных из формы чтобы использовать отформатированные даты
    const _originalGenerateTour = window.generateTour;
  </script>
</body>

</html>
